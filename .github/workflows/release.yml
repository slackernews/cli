name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: slackernews
          repositories: cli,homebrew-tap,scoop-bucket

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Install WiX tools (for MSI)
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools

      - name: Generate Windows MSI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p msi-build
          cp dist/slackernews_windows_amd64_v1/slackernews.exe msi-build/
          sed "s|$(var.Version)|$VERSION|g; s|$(var.Platform)|x64|g; s|$(var.ProgramFilesFolder)|ProgramFiles64Folder|g" packaging/windows/slackernews.wxs > msi-build/slackernews.wxs
          wixl -v msi-build/slackernews.wxs -o dist/slackernews_${GITHUB_REF_NAME}_windows_x86_64.msi

      - name: Upload MSI to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/slackernews_${GITHUB_REF_NAME}_windows_x86_64.msi --clobber

      - name: Generate winget manifests
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TAG="${GITHUB_REF_NAME}"
          DATE=$(date -u +%Y-%m-%d)
          
          # Generate installer manifest
          sed -e "s/{{ .Version }}/$VERSION/g" \
              -e "s/{{ .Tag }}/$TAG/g" \
              -e "s/{{ .Date }}/$DATE/g" \
              -e "s/{{ .Checksum }}/PLACEHOLDER_SHA256/g" \
              packaging/winget/slackernews.installer.yaml > dist/winget/slackernews.installer.yaml
          
          # Generate locale manifest  
          sed -e "s/{{ .Version }}/$VERSION/g" \
              -e "s/{{ .Tag }}/$TAG/g" \
              packaging/winget/slackernews.locale.en-US.yaml > dist/winget/slackernews.locale.en-US.yaml
          
          # Generate version manifest
          sed -e "s/{{ .Version }}/$VERSION/g" \
              packaging/winget/slackernews.yaml > dist/winget/slackernews.yaml
          
          echo "Winget manifests generated in dist/winget/"
          echo "Note: SHA256 checksums need to be populated after release assets are published"
          echo "Submit these manifests to https://github.com/microsoft/winget-pkgs via PR"

      - name: Upload winget manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d dist/winget ]; then
            zip -r dist/slackernews_${GITHUB_REF_NAME}_winget-manifests.zip dist/winget/
            gh release upload "${GITHUB_REF_NAME}" dist/slackernews_${GITHUB_REF_NAME}_winget-manifests.zip --clobber
          fi
