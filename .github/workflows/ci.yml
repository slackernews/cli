name: CI

on:
  push:
    branches:
      - main
      - master
      - 'feat/**'
      - 'fix/**'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: go build -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  integration:
    runs-on: ubuntu-latest
    needs:
      - test
      - lint
    steps:
      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build CLI
        run: |
          cd cli
          go build -o slackernews ./...

      - name: Checkout server
        uses: actions/checkout@v4
        with:
          repository: slackernews/slackernews
          ref: main
          path: server

      - name: Set up Node.js for server
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/slackernews/package-lock.json

      - name: Install server dependencies
        run: |
          cd server/slackernews
          npm ci

      - name: Start server
        run: |
          cd server/slackernews
          DB_URI="sqlite:/tmp/cli-integration.db" npm run dev &
          echo $! > /tmp/server.pid
          # Wait for server to be ready (check API health endpoint)
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1 || \
               curl -sf http://localhost:3000/api/v1/links > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Generate test token
        id: token
        run: |
          cd server/slackernews
          TOKEN=$(DB_URI="sqlite:/tmp/cli-integration.db" node scripts/ci-create-test-token.js)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure CLI
        run: |
          cd cli
          ./slackernews configure --url http://localhost:3000 --token "${{ steps.token.outputs.token }}" --insecure

      - name: Test read-only CLI commands
        run: |
          cd cli
          echo "=== Testing top command ==="
          ./slackernews top --insecure
          
          echo "=== Testing search command ==="
          ./slackernews search kubernetes --insecure

      - name: Find a link to test actions
        id: find-link
        run: |
          cd cli
          # Try to get a link URL from the top command for action tests
          LINK_URL=$(./slackernews top --json --insecure 2>/dev/null | grep -o '"url":"[^"]*"' | head -1 | sed 's/"url":"//;s/"$//')
          if [ -n "$LINK_URL" ]; then
            echo "Found link: $LINK_URL"
            echo "link=$LINK_URL" >> $GITHUB_OUTPUT
          else
            echo "No links found in database, skipping action tests"
            echo "link=" >> $GITHUB_OUTPUT
          fi

      - name: Test upvote command
        if: steps.find-link.outputs.link != ''
        run: |
          cd cli
          ./slackernews upvote "${{ steps.find-link.outputs.link }}" --insecure

      - name: Test comment command
        if: steps.find-link.outputs.link != ''
        run: |
          cd cli
          ./slackernews comment "${{ steps.find-link.outputs.link }}" "CI integration test" --insecure

      - name: Test unvote command
        if: steps.find-link.outputs.link != ''
        run: |
          cd cli
          ./slackernews unvote "${{ steps.find-link.outputs.link }}" --insecure

      - name: Stop server and cleanup
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi
          rm -f /tmp/cli-integration.db
