# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json

PackageIdentifier: SlackerNews.Cli
PackageVersion: "{{ .Version }}"
InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
  - RelativeFilePath: slackernews.exe
    PortableCommandAlias: slackernews
InstallModes:
  - silent
  - silentWithProgress
UpgradeBehavior: install
Commands:
  - slackernews
ReleaseDate: "{{ .Date }}"
Installers:
  - Architecture: x64
    InstallerUrl: "https://github.com/slackernews/cli/releases/download/{{ .Tag }}/slackernews_{{ .Version }}_windows_x86_64.zip"
    InstallerSha256: "{{ .Checksum }}"
  - Architecture: arm64
    InstallerUrl: "https://github.com/slackernews/cli/releases/download/{{ .Tag }}/slackernews_{{ .Version }}_windows_arm64.zip"
    InstallerSha256: "{{ .Checksum }}"
ManifestType: installer
ManifestVersion: 1.6.0
